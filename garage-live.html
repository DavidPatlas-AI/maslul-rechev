<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מוסכניקים חיים | AutoTech 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Assistant:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #06090e;
    --bg2:     #0b0f17;
    --panel:   #151b26;
    --panel2:  #1a2130;
    --border:  #232d3a;
    --amber:   #ff9a1f;
    --teal:    #2dd4bf;
    --red:     #f0584e;
    --green:   #37d399;
    --blue:    #5aa9ff;
    --purple:  #a78bfa;
    --text:    #e2e8f0;
    --muted:   #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Assistant', sans-serif;
    font-size: 16px;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    font-family: 'Secular One', sans-serif;
    font-size: 1.2rem;
    color: var(--amber);
    text-decoration: none;
  }
  .nav-back {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--text); }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, #0d1a2b 0%, var(--bg2) 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 32px;
    text-align: center;
  }
  .hero h1 {
    font-family: 'Secular One', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    color: var(--amber);
    margin-bottom: 10px;
  }
  .hero p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 500px;
    margin: 0 auto 24px;
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(55, 211, 153, 0.1);
    border: 1px solid rgba(55, 211, 153, 0.3);
    color: var(--green);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 860px;
    margin: 28px auto 0;
    padding: 0 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px 10px 40px;
    border-radius: 10px;
    font-family: 'Assistant', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--amber); }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Assistant', sans-serif;
  }
  .chip:hover { border-color: var(--amber); color: var(--text); }
  .chip.active { background: var(--amber); border-color: var(--amber); color: #000; font-weight: 700; }

  /* ── TABS ── */
  .tabs {
    max-width: 860px;
    margin: 20px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 20px;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 600;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: 'Assistant', sans-serif;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* ── MESSAGES ── */
  .content {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px;
  }
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .stat span { color: var(--amber); font-weight: 700; font-size: 1.1rem; margin-left: 6px; }

  .messages-list { display: flex; flex-direction: column; gap: 14px; }

  .msg-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    transition: border-color 0.2s, transform 0.15s;
    animation: fadeUp 0.3s ease;
  }
  .msg-card:hover { border-color: var(--amber); transform: translateY(-1px); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .msg-avatar {
    width: 36px; height: 36px;
    background: var(--panel2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .msg-sender {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
  }
  .msg-time {
    font-size: 0.8rem;
    color: var(--muted);
    margin-right: auto;
    font-family: 'JetBrains Mono', monospace;
  }
  .msg-cat {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 700;
    border: 1px solid;
  }
  .msg-text {
    font-size: 0.97rem;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-card.new-msg { border-color: var(--green); }

  /* Category colors */
  .cat-מנוע    { color: var(--amber);  border-color: var(--amber);  background: rgba(255,154,31,0.1); }
  .cat-חשמל   { color: var(--blue);   border-color: var(--blue);   background: rgba(90,169,255,0.1); }
  .cat-שלדה   { color: var(--teal);   border-color: var(--teal);   background: rgba(45,212,191,0.1); }
  .cat-גיר     { color: var(--purple); border-color: var(--purple); background: rgba(167,139,250,0.1); }
  .cat-מיזוג  { color: var(--green);  border-color: var(--green);  background: rgba(55,211,153,0.1); }
  .cat-גוף    { color: #f97316;       border-color: #f97316;       background: rgba(249,115,22,0.1); }
  .cat-כללי   { color: var(--muted);  border-color: var(--border); background: transparent; }

  /* Cat avatars */
  .cat-icon-מנוע   { background: rgba(255,154,31,0.15); }
  .cat-icon-חשמל  { background: rgba(90,169,255,0.15); }
  .cat-icon-שלדה  { background: rgba(45,212,191,0.15); }
  .cat-icon-גיר    { background: rgba(167,139,250,0.15); }
  .cat-icon-מיזוג { background: rgba(55,211,153,0.15); }
  .cat-icon-כללי  { background: rgba(100,116,139,0.15); }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty h3 { font-family: 'Secular One', sans-serif; color: var(--text); margin-bottom: 8px; }

  /* ── LOADER ── */
  .loader {
    display: flex;
    justify-content: center;
    padding: 48px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CONFIG OVERLAY ── */
  .config-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .config-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 480px;
    width: 100%;
  }
  .config-box h2 {
    font-family: 'Secular One', sans-serif;
    color: var(--amber);
    margin-bottom: 12px;
    font-size: 1.3rem;
  }
  .config-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; line-height: 1.6; }
  .config-box input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 12px;
    outline: none;
  }
  .config-box input:focus { border-color: var(--amber); }
  .config-save {
    width: 100%;
    background: var(--amber);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-family: 'Secular One', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .config-save:hover { opacity: 0.85; }

  @media (max-width: 600px) {
    .controls { flex-direction: column; }
    .search-wrap { min-width: 100%; }
    nav { padding: 0 16px; }
    .content { padding: 16px; }
    .hero { padding: 32px 16px 24px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="index.html">⚙️ AutoTech 2026</a>
  <a class="nav-back" href="index.html">← חזרה לקורס</a>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>🔧 מוסכניקים חיים</h1>
  <p>מידע בזמן אמת מהקבוצה המקצועית — תקלות, פתרונות, וטיפים מהשטח</p>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span>עדכון חי</span>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="חפש תקלה, חלק, סימפטום..." oninput="applyFilters()">
  </div>
  <div class="chips" id="catChips">
    <div class="chip active" data-cat="הכל" onclick="selectCat(this)">הכל</div>
    <div class="chip" data-cat="מנוע"  onclick="selectCat(this)">🔩 מנוע</div>
    <div class="chip" data-cat="חשמל"  onclick="selectCat(this)">⚡ חשמל</div>
    <div class="chip" data-cat="שלדה"  onclick="selectCat(this)">🛞 שלדה</div>
    <div class="chip" data-cat="גיר"   onclick="selectCat(this)">⚙️ גיר</div>
    <div class="chip" data-cat="מיזוג" onclick="selectCat(this)">❄️ מיזוג</div>
    <div class="chip" data-cat="כללי"  onclick="selectCat(this)">💬 כללי</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" id="tab-live" onclick="switchTab('live')">📡 פיד חי</div>
  <div class="tab" id="tab-archive" onclick="switchTab('archive')">📚 ארכיון</div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="stats-bar" id="statsBar"></div>
  <div id="messagesList">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</div>

<!-- CONFIG OVERLAY (shown when Firebase not configured) -->
<div class="config-overlay" id="configOverlay" style="display:none">
  <div class="config-box">
    <h2>🔧 הגדרת Firebase</h2>
    <p>הכנס את פרטי Firebase שלך. אלה נשמרים רק בדפדפן שלך.</p>
    <input type="text" id="cfgApiKey"       placeholder="apiKey">
    <input type="text" id="cfgProjectId"    placeholder="projectId">
    <input type="text" id="cfgAppId"        placeholder="appId">
    <button class="config-save" onclick="saveConfig()">שמור והתחבר</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js';
  import {
    getFirestore, collection, query, orderBy, limit,
    onSnapshot, getDocs, startAfter, where
  } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

  // ── Firebase config — ימולא אוטומטית אחרי שתגדיר ──────────────────────
  const FIREBASE_CONFIG = {
    apiKey:            "REPLACE_API_KEY",
    authDomain:        "REPLACE_PROJECT_ID.firebaseapp.com",
    projectId:         "REPLACE_PROJECT_ID",
    storageBucket:     "REPLACE_PROJECT_ID.appspot.com",
    messagingSenderId: "REPLACE_SENDER_ID",
    appId:             "REPLACE_APP_ID",
  };
  // ────────────────────────────────────────────────────────────────────────

  const isConfigured = !FIREBASE_CONFIG.apiKey.startsWith('REPLACE');

  if (!isConfigured) {
    document.getElementById('configOverlay').style.display = 'flex';
  }

  // read saved config from localStorage if available
  const savedCfg = JSON.parse(localStorage.getItem('fb_config') || 'null');
  const cfg = savedCfg || (isConfigured ? FIREBASE_CONFIG : null);

  window.saveConfig = function() {
    const c = {
      apiKey:    document.getElementById('cfgApiKey').value.trim(),
      projectId: document.getElementById('cfgProjectId').value.trim(),
      appId:     document.getElementById('cfgAppId').value.trim(),
    };
    c.authDomain      = `${c.projectId}.firebaseapp.com`;
    c.storageBucket   = `${c.projectId}.appspot.com`;
    localStorage.setItem('fb_config', JSON.stringify(c));
    location.reload();
  };

  if (!cfg) {
    document.getElementById('messagesList').innerHTML =
      '<div class="empty"><div class="empty-icon">⚙️</div><h3>נא להגדיר Firebase</h3><p>לחץ על הכפתור למעלה</p></div>';
    throw new Error('No Firebase config');
  }

  const app = initializeApp(cfg);
  const db  = getFirestore(app);

  // ── State ───────────────────────────────────────────────────────────────
  let allMessages  = [];
  let activeTab    = 'live';
  let activeCat    = 'הכל';
  let searchText   = '';
  let unsubLive    = null;
  let archiveDocs  = [];
  let archiveLast  = null;
  let archiveLoading = false;

  // expose to global for onclick handlers
  window.activeTab  = () => activeTab;
  window.activeCat  = () => activeCat;
  window.searchText = () => searchText;

  // ── Render helpers ──────────────────────────────────────────────────────
  const CAT_ICONS = {
    'מנוע':'🔩','חשמל':'⚡','שלדה':'🛞','גיר':'⚙️','מיזוג':'❄️','גוף':'🚗','כללי':'💬'
  };

  function formatTime(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60)   return 'עכשיו';
    if (diff < 3600) return `לפני ${Math.floor(diff/60)} דק׳`;
    if (diff < 86400) return `לפני ${Math.floor(diff/3600)} שע׳`;
    return d.toLocaleDateString('he-IL');
  }

  function renderCard(msg, isNew = false) {
    const icon = CAT_ICONS[msg.category] || '💬';
    return `
      <div class="msg-card${isNew ? ' new-msg' : ''}">
        <div class="msg-header">
          <div class="msg-avatar cat-icon-${msg.category || 'כללי'}">${icon}</div>
          <span class="msg-sender">${escHtml(msg.sender || 'לא ידוע')}</span>
          <span class="msg-cat cat-${msg.category || 'כללי'}">${msg.category || 'כללי'}</span>
          <span class="msg-time">${formatTime(msg.timestamp)}</span>
        </div>
        <div class="msg-text">${escHtml(msg.text)}</div>
      </div>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  function renderList(msgs) {
    const el = document.getElementById('messagesList');
    if (!msgs.length) {
      el.innerHTML = `<div class="empty">
        <div class="empty-icon">📭</div>
        <h3>אין הודעות</h3>
        <p>עדיין אין תוצאות לסינון הזה</p>
      </div>`;
      return;
    }
    el.innerHTML = msgs.map((m, i) => renderCard(m, i === 0 && activeTab === 'live')).join('');
  }

  function updateStats(msgs) {
    const cats = {};
    msgs.forEach(m => { cats[m.category] = (cats[m.category] || 0) + 1; });
    const top = Object.entries(cats).sort((a,b) => b[1]-a[1]).slice(0,3);
    document.getElementById('statsBar').innerHTML =
      `<div class="stat">סה"כ <span>${msgs.length}</span> הודעות</div>` +
      top.map(([c,n]) => `<div class="stat">${CAT_ICONS[c]||'💬'} ${c} <span>${n}</span></div>`).join('');
  }

  function applyFilters() {
    searchText = document.getElementById('searchInput').value.toLowerCase();
    const base  = activeTab === 'live' ? allMessages : archiveDocs;
    let filtered = base;
    if (activeCat !== 'הכל') filtered = filtered.filter(m => m.category === activeCat);
    if (searchText) filtered = filtered.filter(m =>
      m.text.toLowerCase().includes(searchText) ||
      (m.sender || '').toLowerCase().includes(searchText)
    );
    renderList(filtered);
    updateStats(filtered);
  }
  window.applyFilters = applyFilters;

  // ── Tab switching ───────────────────────────────────────────────────────
  window.switchTab = function(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    if (tab === 'live') {
      startLiveFeed();
    } else {
      if (unsubLive) { unsubLive(); unsubLive = null; }
      loadArchive();
    }
  };

  // ── Category filter ─────────────────────────────────────────────────────
  window.selectCat = function(el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeCat = el.dataset.cat;
    applyFilters();
  };

  // ── Live feed (real-time) ───────────────────────────────────────────────
  function startLiveFeed() {
    document.getElementById('messagesList').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    if (unsubLive) unsubLive();

    const q = query(
      collection(db, 'messages'),
      orderBy('timestamp', 'desc'),
      limit(50)
    );

    unsubLive = onSnapshot(q, (snap) => {
      allMessages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      applyFilters();
    }, (err) => {
      document.getElementById('messagesList').innerHTML =
        `<div class="empty"><div class="empty-icon">❌</div><h3>שגיאת חיבור</h3><p>${err.message}</p></div>`;
    });
  }

  // ── Archive (paginated) ─────────────────────────────────────────────────
  async function loadArchive(loadMore = false) {
    if (archiveLoading) return;
    archiveLoading = true;

    if (!loadMore) {
      archiveDocs = [];
      archiveLast = null;
      document.getElementById('messagesList').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    }

    let q = query(
      collection(db, 'messages'),
      orderBy('timestamp', 'desc'),
      limit(30)
    );
    if (archiveLast) q = query(q, startAfter(archiveLast));

    const snap = await getDocs(q);
    snap.docs.forEach(d => archiveDocs.push({ id: d.id, ...d.data() }));
    archiveLast = snap.docs[snap.docs.length - 1] || null;
    archiveLoading = false;
    applyFilters();
  }

  // ── Init ────────────────────────────────────────────────────────────────
  startLiveFeed();
</script>
</body>
</html>
