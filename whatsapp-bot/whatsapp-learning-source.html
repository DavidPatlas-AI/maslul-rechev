function clean(t){return (t||'').replace(' · מאפס לרכב','').replace(' - גרסת משחקים','')}
function topic(p){let t=clean(p.title).replace(/^פרק\s*\d+[:：]?\s*/,'').replace(/·.*$/,'').trim();return t||clean(p.title)}
function chatName(p){return funTitles[p.chapter]||(/סימולטור|מעבדת|מבחן|אבחון|תקלות/.test(p.title)?'אתגר: '+topic(p):p.chapter?'פרק '+p.chapter+': '+topic(p):topic(p))}
function iconFor(p){const g=p.group||'';const t=p.title||'';if(/חשמל|סוללה|טעינה|חשמלי/.test(g+t))return '🔋';if(/אבחון|תקלה|סורק|OBD|מבחן/.test(g+t))return '🔎';if(/צה|בטחון|ביטחון|אט/.test(g+t))return '🛡️';if(/מנוע|דלק|קירור|גיר/.test(t))return '⚙️';if(/סמלי|יצרנים|מאגר/.test(g+t))return '📚';return p.chapter||'🚗'}
function preview(p){if(state.done.has(p.file))return '✓✓ סיימת. אפשר לעבור לשיחה הבאה';if(/סימולטור|מעבדת|מבחן|אבחון/.test(p.title))return 'שלח לך אתגר קצר + בדיקה מהירה';if(/חשמלי|סוללה|טעינה/.test(p.group+p.title))return 'טיפ חשמלי קצר, בלי מילים מפוצצות';if(/צה/.test(p.group+p.title))return 'סטורי חדש על רכבי שטח וביטחון';return 'הודעה חדשה: טיפ קצר לפני הפרק'}
function matchesStory(p){const s=state.story;if(s==='הכל')return true;const text=(p.title+' '+p.group).toLowerCase();if(s==='תקלה היום')return /תקלה|אבחון|סורק|מנוע/.test(text);if(s==='רכב יוקרה')return /יוקרה|מתלים|שמע|אווירודינמיקה|פרימיום/.test(text);if(s==='נורת מנוע')return /מנוע|obd|קודים|אבחון/.test(text);if(s==='בדיקת קנייה')return /זהות|מספר|קנייה|יצרנים|רכבים בישראל/.test(text);if(s==='מוסך או לא')return /מוסך|תקלות|חלפים|לקוח/.test(text);if(s==='טיפ 30 שנ׳')return p.chapter&&p.chapter<=20;if(s==='חשמלי')return /חשמלי|סוללה|טעינה|BMS|מימן/.test(text);if(s==='צה״ל')return /צה|ביטחון|בטחון|אט״ל/.test(text);if(s==='בחן אותי')return /מבחן|סימולטור|האקתון|הסמכה/.test(text);return true}
function filtered(){const q=state.query.toLowerCase();return pages.filter(p=>{const tabOk=state.tab==='all'||state.tab==='stories'||(state.tab==='done'?state.done.has(p.file):!state.done.has(p.file));const storyOk=matchesStory(p);const qOk=!q||(p.title+' '+p.group+' '+p.level+' '+chatName(p)).toLowerCase().includes(q);return tabOk&&storyOk&&qOk})}

function pinBoard(){return `<section class="pin-board"><div class="pin"><strong>מה ללמוד היום</strong><p>פרק אחד קצר, דוגמה אחת, ואז שאלה קטנה. בלי להציף.</p></div><div class="pin"><strong>למה זה עובד</strong><p>אתה לומד דרך סימנים אמיתיים: רעש, נורה, קוד, חום, טעינה.</p></div><div class="pin"><strong>המסלול שלך</strong><p>${state.done.size} שיחות סומנו. המשך מהשיחה שמרגישה לך הכי דחופה.</p></div></section>`}
function contentDrop(){return `<div class="content-drop">${contentDrops.map(x=>`<div class="drop-row"><i>${x.icon}</i><div><b>${x.title}</b><small>${x.text}</small></div><a href="#" data-jump="${x.query}">פתח</a></div>`).join('')}</div>`}function renderStories(){stories.innerHTML=storyData.map(s=>`<div class="story" data-story="${s[0]}"><div class="story-ring"><div class="story-face">${s[1]}</div></div><span>${s[0]}</span></div>`).join('');stories.querySelectorAll('.story').forEach(el=>el.onclick=()=>{state.story=el.dataset.story;renderList();show('פתחת סטורי: '+el.dataset.story)})}
function renderList(){const list=filtered();chatList.innerHTML=list.length?list.map(p=>`<div class="thread ${state.current&&state.current.file===p.file?'active':''}" data-file="${p.file}"><div class="thread-pic">${iconFor(p)}</div><div><h3>${chatName(p)}</h3><p>${preview(p)}</p></div><div class="meta"><div class="time">${p.chapter?'פרק '+p.chapter:'כלי'}</div>${state.done.has(p.file)?'':'<span class="badge">1</span>'}</div></div>`).join(''):'<div class="empty">לא מצאתי שיחה מתאימה</div>';chatList.querySelectorAll('.thread').forEach(el=>el.onclick=()=>selectPage(pages.find(p=>p.file===el.dataset.file),true))}
function profileCard(p){return `<section class="profile-card"><div class="profile-top"><div class="profile-avatar">${iconFor(p)}</div><div><h3>${chatName(p)}</h3><p>איתי מהמוסך שלח לך מסלול קצר: להבין מה קורה, לראות סימן אמיתי, ואז לפתוח את הפרק כשאתה כבר בפוקוס.</p></div></div><div class="chips"><span>${p.chapter?'פרק '+p.chapter:'כלי שימושי'}</span><span>${p.group||'מסלול'}</span><span>${/סימולטור|מעבדת|מבחן|אבחון/.test(p.title)?'אתגר חי':'שיעור קצר'}</span><span>${Math.max(3,Math.min(12,(p.chapter||4)%10+3))} דק׳</span></div></section>`}
function scriptFor(p){const name=chatName(p),top=topic(p);return [
{who:'bot',html:`<h3>${name}</h3><p>תקשיב, את זה לומדים הכי טוב כמו שיחה. אני נותן לך את הקטע החשוב, בלי הרצאה של שעה.</p>`},
{who:'me',html:`<p>יאללה, מה אני צריך לדעת?</p>`},
{who:'bot',html:`<p><b>במשפט אחד:</b> ${top} זה משהו שאתה צריך לזהות מהר ברכב אמיתי, לפני שאתה מתחיל לנחש או להחליף חלקים.</p><div class="media-card"><div class="media-visual"><i class="spark s1"></i><i class="spark s2"></i><i class="spark s3"></i></div><div class="media-caption">צילום מדומה מהשטח: סימן, קוד, או רכיב שצריך להבין לפני פעולה.</div></div>`},
{who:'bot',html:`<p>פה הרבה נופלים: זוכרים שם של חלק, אבל לא יודעים מה לבדוק בפועל.</p><div class="mini-grid"><div class="mini-panel"><strong>מה לבדוק</strong><ul><li>מה הסימן?</li><li>מתי זה קורה?</li><li>איזו בדיקה תאשר?</li></ul></div><div class="mini-panel"><strong>רמת ביטחון</strong><div class="bars"><i style="--v:82%"></i><i style="--v:58%"></i><i style="--v:36%"></i></div></div></div>`},
{who:'me',html:`<p>שלח לי תקציר קולי.</p>`},
{who:'bot',html:`<div class="voice"><button class="play">▶</button><div class="wave"></div><span>0:${(p.chapter||7)%10+31}</span></div><small>הודעה קולית מדומה: הטיפ של איתי</small>`},
{who:'bot',html:`<p><b>בחירה שלך:</b> רוצה דוגמה, שאלה קטנה, או לפתוח את הפרק המלא?</p>${contentDrop()}<div class="actions"><button data-action="example">תן דוגמה</button><button data-action="quiz">בחן אותי</button><button data-action="open">פתח פרק</button></div>`},
{who:'bot',html:`<p><b>דוגמה:</b> אם לקוח אומר “האוטו מרגיש חלש”, לא מתחילים מהחלפת חלק. קודם מחפשים סימן: קוד תקלה, רעש, חום, טעינה, או נתון חריג בסורק.</p>`},
{who:'bot',html:`<p><b>שאלת בזק:</b> מה עדיף לעשות ראשון?</p><div class="actions"><button data-action="next">לנחש חלק</button><button data-action="done">לבדוק סימן ומדידה</button><button data-action="open">לפתוח פרק מלא</button></div>`},
{who:'bot',html:`<p>יפה. עכשיו אתה יכול לפתוח את הפרק, או לסמן שסיימת ולתת לשיחה הבאה להמשיך אותך.</p>`}
]}
function renderMessages(){const all=scriptFor(state.current);const visible=all.slice(0,Math.min(all.length,state.step+4));messages.innerHTML=profileCard(state.current)+pinBoard()+'<div class="day">היום · AutoBro</div>'+visible.map(m=>`<div class="bubble ${m.who==='me'?'me':'bot'}">${m.html}<small>${m.who==='me'?'נקרא ✓✓':'איתי מהמוסך'} · עכשיו</small></div>`).join('')+(state.step<all.length-4?'<div class="typing"><i></i><i></i><i></i></div>':'');messages.scrollTop=0}
function selectPage(p,openMobile=false){state.current=p;state.step=0;headTitle.textContent=chatName(p);headSub.textContent='מקליד עכשיו... · '+(p.group||'מסלול');contactPic.textContent=String(iconFor(p)).replace(/\d+/,'AB');openLesson.href=p.file;doneBtn.textContent=state.done.has(p.file)?'✓':'○';renderMessages();renderList();if(openMobile)shell.classList.add('chat-open')}
function next(){const max=scriptFor(state.current).length-4;if(state.step<max){state.step++;renderMessages()}else{location.href=state.current.file}}
function show(text){toast.textContent=text;toast.classList.add('show');clearTimeout(show.t);show.t=setTimeout(()=>toast.classList.remove('show'),1600)}
search.oninput=e=>{state.query=e.target.value;renderList()};document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.tab=b.dataset.tab;renderList()});$('backBtn').onclick=()=>shell.classList.remove('chat-open');$('nextBtn').onclick=next;doneBtn.onclick=()=>{state.done.has(state.current.file)?state.done.delete(state.current.file):state.done.add(state.current.file);save();selectPage(state.current);show(state.done.has(state.current.file)?'סומן שסיימת':'הוחזר לרשימה')};messages.addEventListener('click',e=>{const j=e.target.closest('[data-jump]');if(j){e.preventDefault();search.value=j.dataset.jump;state.query=j.dataset.jump;shell.classList.remove('chat-open');renderList();show('פתחתי לך שיחות על '+j.dataset.jump);return}const b=e.target.closest('[data-action]');if(!b)return;const a=b.dataset.action;if(a==='open')location.href=state.current.file;else if(a==='done'){state.done.add(state.current.file);save();selectPage(state.current);show('סיימת את השיחה')}else next()});document.querySelectorAll('[data-quick]').forEach(b=>b.onclick=()=>{reply.value=b.dataset.quick;if(b.dataset.quick==='פתח פרק')location.href=state.current.file;else next()});reply.addEventListener('keydown',e=>{if(e.key==='Enter')next()});renderStories();renderTodayPanel();selectPage(pages[0]);renderList();
</script>
<script id="autobro-v2-upgrade">
(function(){
  iconFor=function(p){if(p.chapter)return p.chapter;const g=p.group||'';const t=p.title||'';if(/חשמל|סוללה|טעינה|חשמלי/.test(g+t))return '🔋';if(/אבחון|תקלה|סורק|OBD|מבחן/.test(g+t))return '🔎';if(/צה|בטחון|ביטחון|אט/.test(g+t))return '🛡️';if(/סמלי|יצרנים|מאגר/.test(g+t))return '📚';return '🚗'};
  const routes=[
    {cls:'buy',icon:'🔎',title:'לפני שקונים רכב',text:'שלדה, קילומטרז׳, רישיון, נורות וסריקה',term:'תעודת זהות'},
    {cls:'obd',icon:'🔵',title:'נורת מנוע נדלקה',text:'מה עושים לפני שמחליפים חלקים',term:'OBD'},
    {cls:'electric',icon:'🔋',title:'חשמלי בלי לחץ',text:'טעינה, BMS, טווח וחום סוללה',term:'חשמלי'},
    {cls:'garage',icon:'🧰',title:'שיחת מוסך חכמה',text:'השאלות שמגלות תקלה מהר',term:'שיחת טלפון'}
  ];
  function pick(term){return pages.find(p=>(p.title+' '+p.group+' '+chatName(p)).includes(term))||pages[0]}
  function openTerm(term){const p=pick(term); search.value=term; state.query=term; selectPage(p, innerWidth<901); renderList(); show('פתחתי מסלול: '+term)}
  function addRoutes(){if(document.querySelector('.route-shelf'))return; const html=`<div class="route-shelf"><div class="route-title">מסלולים מהירים <span>בחר מצב, לא פרק</span></div><div class="route-grid">${routes.map(r=>`<button class="route-card ${r.cls}" data-route="${r.term}"><b>${r.title}</b><small>${r.text}</small><i>${r.icon}</i></button>`).join('')}</div></div>`; todayPanel.insertAdjacentHTML('afterend',html); document.querySelectorAll('[data-route]').forEach(b=>b.onclick=()=>openTerm(b.dataset.route));}
  const baseToday=renderTodayPanel; renderTodayPanel=function(){baseToday();addRoutes();};
  function category(p){const t=(p.title+' '+p.group).toLowerCase(); if(/obd|סורק|קודים|אבחון|תקלה/.test(t))return 'obd'; if(/חשמלי|סוללה|טעינה|bms|מימן/.test(t))return 'electric'; if(/צה|ביטחון|בטחון|אט״ל|קרב/.test(t))return 'security'; if(/לקוח|מוסך|חלפים|מכרז/.test(t))return 'garage'; if(/מספר|זהות|קנייה|רכבים בישראל|יצרנים/.test(t))return 'buy'; if(/מנוע|קירור|דלק|גיר|בלמים|היגוי|צמיג/.test(t))return 'system'; return 'basic';}
  function lessonPack(p){const c=category(p); const packs={
    obd:{icon:'🔵',case:'נורת מנוע נדלקה אחרי נסיעה. לפני שמחליפים חיישן, קוראים קוד, בודקים Freeze Frame ושואלים מה השתנה ברכב.',check:['קוד תקלה','נתוני חיישן','חיווט/מתח','נסיעת מבחן'],trap:'לא כל קוד על חיישן אומר שהחיישן מת.'},
    electric:{icon:'🔋',case:'לקוח אומר שהטווח ירד. בודקים טעינה, טמפ׳ סוללה, איזון תאים ודפוס נסיעה לפני שמאשימים סוללה.',check:['SOC/SOH','טמפרטורה','טעינה','צריכת חשמל'],trap:'טווח נמוך יכול להיות מזגן, צמיגים או קור, לא רק סוללה.'},
    security:{icon:'🛡️',case:'רכב שטח/ביטחון עובד קשה: אבק, משקל, חום, חשמל נוסף וזעזועים. האבחון מתחיל מתנאי העבודה.',check:['שלדה','מערכת חשמל','קירור','עומס'],trap:'רכב ביטחון נבדק לפי שימוש, לא רק לפי קטלוג.'},
    garage:{icon:'🧰',case:'לקוח מתקשר עם “האוטו עושה רעש”. השאלה הנכונה חוסכת שעה: מתי, איפה, באיזו מהירות ומה השתנה לאחרונה.',check:['שאלות פתיחה','סימפטום','תיעוד','הצעת בדיקה'],trap:'בלי שאלות טובות מקבלים אבחון יקר ומבולבל.'},
    buy:{icon:'🔎',case:'לפני קנייה לא מתלהבים מצבע יפה. בודקים רישיון, בעלויות, ק״מ, נורות, שלדה וסריקה קצרה.',check:['רישיון','קילומטרז׳','נורות','בדיקת מחשב'],trap:'מחיר טוב מדי דורש בדיקה כפולה.'},
    system:{icon:'⚙️',case:'מערכת ברכב לא עומדת לבד. מנוע, קירור, דלק, חשמל וחיישנים משפיעים אחד על השני.',check:['סימן','מדידה','השוואה','אישור'],trap:'לא מחליפים חלק לפני שמבינים למה הוא נכשל.'},
    basic:{icon:'🚗',case:'הפרק הזה בונה בסיס: שמות, סימנים, סדר בדיקה ואיך לחשוב כמו מאבחן.',check:['מושג','סימן','דוגמה','תרגול'],trap:'בסיס טוב חוסך בלגן בפרקים הקשים.'}
  }; return packs[c];}
  scriptFor=function(p){const name=chatName(p), top=topic(p), pack=lessonPack(p); return [
    {who:'bot',html:`<h3>${name}</h3><p>אוקיי, הפעם עושים את זה כמו חבר שמבין רכבים: קצר, חי, ועם דוגמה שאפשר לדמיין במוסך.</p><span class="status-note">${pack.icon} סטטוס חדש על ${top}</span>`},
    {who:'me',html:`<p>מה הסיפור של הפרק הזה?</p>`},
    {who:'bot',html:`<p><b>הסיפור:</b> ${pack.case}</p><div class="scenario"><div class="scenario-head"><i>${pack.icon}</i><b>מקרה מהשטח</b></div><div class="scenario-body">המטרה שלך: לא לזכור חומר כמו תוכי, אלא לזהות מה לבדוק ומה לא לעשות מוקדם מדי.</div></div>`},
    {who:'bot',html:`<p><b>ערכת בדיקה מהירה:</b></p><div class="toolkit">${pack.check.map((x,i)=>`<div><b>${i+1}. ${x}</b><small>בודקים, משווים, ורק אז מחליטים.</small></div>`).join('')}</div>`},
    {who:'me',html:`<p>איפה רוב האנשים נופלים?</p>`},
    {who:'bot',html:`<div class="quiz-card"><b>הטעות הנפוצה</b><p>${pack.trap}</p></div>`},
    {who:'bot',html:`<div class="voice"><button class="play">▶</button><div class="wave"></div><span>0:${(p.chapter||6)%9+34}</span></div><small>הודעה קולית מדומה: איתי מסביר את זה בקטנה</small>`},
    {who:'bot',html:`<p><b>רוצה להמשיך איך?</b></p><div class="actions"><button data-action="example">דוגמה נוספת</button><button data-action="quiz">שאלת בזק</button><button data-action="open">פתח פרק</button></div>`},
    {who:'bot',html:`<p><b>דוגמה נוספת:</b> אם הסימפטום חוזר רק בחום או רק במהירות מסוימת, זה רמז. התנאי שבו התקלה מופיעה חשוב כמו התקלה עצמה.</p>`},
    {who:'bot',html:`<p><b>שאלת בזק:</b> מה עושים לפני החלפת חלק?</p><div class="actions"><button data-action="next">בודקים סימן ומדידה</button><button data-action="next">שואלים מתי זה קורה</button><button data-action="open">פותחים את הפרק</button></div>`},
    {who:'bot',html:`<p>סיימת את החימום. עכשיו הפרק המלא יהיה הרבה יותר ברור.</p>`}
  ];};
  function liveStrip(){return `<section class="live-strip"><div class="live-card"><h4>AutoBro עכשיו</h4><p>היום לומדים דרך מקרים: נורה, רעש, טווח, לקוח, בדיקת קנייה. לא קוראים 80 פרקים בבת אחת.</p><div class="live-score"><span>${pages.length} שיחות</span><span>${state.done.size} סומנו</span><span>4 מסלולים</span></div></div><div class="live-card"><h4>האתגר היומי</h4><p>בחר שיחה אחת, ענה על שאלת בזק, ואז פתח את הפרק המלא רק אם הסתקרנת.</p></div></section>`;}
  const baseRender=renderMessages; renderMessages=function(){const all=scriptFor(state.current);const visible=all.slice(0,Math.min(all.length,state.step+4));messages.innerHTML=profileCard(state.current)+liveStrip()+pinBoard()+'<div class="day">היום · AutoBro 2.0</div>'+visible.map(m=>`<div class="bubble ${m.who==='me'?'me':'bot'}">${m.html}<small>${m.who==='me'?'נקרא ✓✓':'איתי מהמוסך'} · עכשיו</small></div>`).join('')+(state.step<all.length-4?'<div class="typing"><i></i><i></i><i></i></div>':'');messages.scrollTop=0;};
  document.body.insertAdjacentHTML('beforeend','<div class="story-pop" id="storyPop"><div class="story-phone"><div><div class="story-bars"><i></i><i></i><i></i><i></i></div><small>AutoBro STATUS</small><h3 id="storyTitle">תקלה היום</h3><p id="storyText">מקרה קצר שמכניס אותך לעניינים.</p></div><button id="storyClose">סגור סטטוס</button></div></div>');
  const storyPop=document.getElementById('storyPop'), storyTitle=document.getElementById('storyTitle'), storyText=document.getElementById('storyText');
  const storyCopy={
    'תקלה היום':'נורת מנוע נדלקה? לא נבהלים. קוראים קוד, מסתכלים מתי זה קורה, ואז מחליטים על בדיקה.',
    'רכב יוקרה':'ברכבי יוקרה הרבה תקלות הן חשמל, חיישנים, מתלים או תוכנה. לא נוגעים לפני אבחון.',
    'בדיקת קנייה':'לפני שמשלמים: רישיון, בעלות, קילומטרז׳, נורות, סריקה ושלדה. אין קיצורי דרך.',
    'טיפ 30 שנ׳':'אם אין לך מדידה, יש לך ניחוש. במוסך טוב מודדים לפני שמחליפים.',
    'חשמלי':'ברכב חשמלי מסתכלים על טעינה, טמפרטורה, SOH, צריכה וטווח בפועל.',
    'בחן אותי':'שאלת היום: מה עושים ראשון כשלקוח אומר שהרכב חלש? מחפשים סימן ומדידה.'
  };
  stories.addEventListener('click',e=>{const el=e.target.closest('.story'); if(!el)return; const title=el.dataset.story; if(title&&title!=='הכל'){storyTitle.textContent=title; storyText.textContent=storyCopy[title]||'סטטוס קצר שמחבר אותך לנושא לפני הפרק.'; storyPop.classList.add('show');}});
  document.getElementById('storyClose').onclick=()=>storyPop.classList.remove('show'); storyPop.onclick=e=>{if(e.target===storyPop)storyPop.classList.remove('show')};
  renderTodayPanel(); selectPage(state.current); renderList();
})();
